# Docker Compose file for Vapor
#
# Install Docker on your system to run and test
# your Vapor app in a production-like environment.
#
# Note: This file is intended for testing and does not
# implement best practices for a production deployment.
#
# Learn more: https://docs.docker.com/compose/reference/
#
#   Build images: docker-compose build
#      Start app: docker-compose up app
#       Stop all: docker-compose down
#
version: '3.7'

x-shared_environment: &shared_environment
  LOG_LEVEL: ${LOG_LEVEL:-debug}
  SQLITE_DATABASE_PATH: ${SQLITE_DATABASE_PATH:-/data/db.sqlite}
  RP_ID: ${RP_ID:-localhost}
  RP_ORIGIN: ${RP_ORIGIN:-http://localhost:8080}
  RP_DISPLAY_NAME: ${RP_DISPLAY_NAME:-Vapor Passkey Demo}
  APN_HANDLE_SECRET: ${APN_HANDLE_SECRET:-}
  APN_KEY_ID: ${APN_KEY_ID:-}
  APN_TEAM_ID: ${APN_TEAM_ID:-}
  APN_PRIVATE_KEY_PATH: ${APN_PRIVATE_KEY_PATH:-}
  APN_PRIVATE_KEY_PEM: ${APN_PRIVATE_KEY_PEM:-}
  APPLE_APP_IDENTIFIER: ${APPLE_APP_IDENTIFIER:-com.example.app}
  
services:
  app:
    image: passkeyvalue:latest
    build:
      context: .
    env_file:
      - .env
    environment:
      <<: *shared_environment
    ports:
      - '8080:8080'
    volumes:
      - sqlite-data:/data
      # Mount your APNs key only when needed and point APN_PRIVATE_KEY_PATH at it.
      # - ./secrets/AuthKey_ABC123XYZ.p8:/run/secrets/passkeyvalue/AuthKey_ABC123XYZ.p8:ro
    # user: '0' # uncomment to run as root for testing purposes even though Dockerfile defines 'vapor' user.
    command: ["serve", "--env", "production", "--hostname", "0.0.0.0", "--port", "8080"]
  migrate:
    image: passkeyvalue:latest
    build:
      context: .
    env_file:
      - .env
    environment:
      <<: *shared_environment
    volumes:
      - sqlite-data:/data
    command: ["migrate", "--yes"]
    deploy:
      replicas: 0
  revert:
    image: passkeyvalue:latest
    build:
      context: .
    env_file:
      - .env
    environment:
      <<: *shared_environment
    volumes:
      - sqlite-data:/data
    command: ["migrate", "--revert", "--yes"]
    deploy:
      replicas: 0

volumes:
  sqlite-data:
